<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Dad — Father's Day</title>
<meta name="description" content="A Father's Day tribute site." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-nav">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="mark"></span> For Dad</a>
    <nav class="nav-links" aria-label="Primary">
      <a href="index.html" class="is-current">Home</a>
      <a href="harresh.html">Harresh</a>
      <a href="levana.html">Levana</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="wrap">
      <p class="eyebrow">Father&rsquo;s Day</p>
      <h1>Two stories,<br />one Father&rsquo;s Day.</h1>
      <p class="lede">Choose a name on the mantel to open their tribute.</p>
    </div>
  </section>

  <section class="mantel">
    <div class="wrap">
      <div class="frame-row">

        <!-- Tile 1 — links to harresh.html -->
        <a class="tile" href="harresh.html" aria-label="Open Harresh's tribute">
          <div class="frame">
            <!-- ✏️ EDIT: replace images/harresh.jpg with the real photo -->
            <img src="harresh-dad-1.jpg" alt="Photo for Harresh's tribute" />
            <div class="glass"></div>
          </div>
          <div class="plate">
            <div class="name">Harresh</div>
            <div class="go">View tribute →</div>
          </div>
        </a>

        <!-- Tile 2 — links to levana.html -->
        <a class="tile" href="levana.html" aria-label="Open Levana's tribute">
          <div class="frame">
            <!-- ✏️ EDIT: replace images/levana.jpg with the real photo -->
            <img src="acca-dad-2.jpg" alt="Photo for Levana's tribute" />
            <div class="glass"></div>
          </div>
          <div class="plate">
            <div class="name">Levana</div>
            <div class="go">View tribute →</div>
          </div>
        </a>

      </div>
      <div class="shelf" aria-hidden="true"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>Made with love, every Father&rsquo;s Day.</span>
    <a href="index.html">Home</a>
  </div>
</footer>

</body>
</html>
